name: Check Build
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install gdal system dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install gdal-bin libgdal-dev python3-gdal
          sudo apt-get -y autoremove
          sudo apt-get clean

      - name: Sync lint dependencies
        run: uv sync --group lint

      - name: Run lint
        run: |
          uv run --no-sync ruff check .
          uv run --no-sync ruff format --check .

  test-yolo:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install gdal system dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install gdal-bin libgdal-dev python3-gdal
          sudo apt-get -y autoremove
          sudo apt-get clean

      - name: Sync yolo test dependencies
        run: uv sync --extra yolo --group test

      - name: Run yolo test
        run: uv run --no-sync --extra yolo python test_yolo.py

  test-ramp:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install gdal system dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install gdal-bin libgdal-dev python3-gdal
          sudo apt-get -y autoremove
          sudo apt-get clean

      - name: Clone Ramp
        run: |
          if [ ! -d ramp-code ]; then
            git clone https://github.com/kshitijrajsharma/ramp-code-fAIr.git ramp-code
          fi

      - name: Download and unpack ramp baseline
        run: |
          if [ ! -d ramp-code/ramp/checkpoint.tf ]; then
            wget -q https://api-prod.fair.hotosm.org/api/v1/workspace/download/ramp/baseline.zip -O baseline.zip
            unzip -oq baseline.zip -d ramp-code/ramp
            rm -f baseline.zip
          fi

      - name: Sync ramp test dependencies
        run: uv sync --extra ramp --group test

      - name: Run ramp test
        run: uv run --no-sync --extra ramp --with ./docker/solaris python test_ramp.py
