name: Check Build
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - uses: ./.github/actions/setup-gdal

      - name: Sync lint dependencies
        run: uv sync --frozen --group lint

      - name: Run lint
        run: |
          uv run --no-sync ruff check .
          uv run --no-sync ruff format --check .

  test-yolo:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - uses: ./.github/actions/setup-gdal

      - name: Sync yolo test dependencies
        run: uv sync --frozen --extra yolo-cpu --extra predict --group test

      - name: Run yolo test
        run: uv run --no-sync --extra yolo-cpu --extra predict python test_yolo.py

  test-ramp:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true

      - uses: ./.github/actions/setup-gdal

      - name: Download and unpack ramp baseline
        run: |
          if [ ! -d ramp-data/baseline/checkpoint.tf ]; then
            mkdir -p ramp-data/baseline
            wget -q https://api-prod.fair.hotosm.org/api/v1/workspace/download/ramp/baseline.zip -O baseline.zip
            unzip -oq baseline.zip -d ramp-data/baseline
            rm -f baseline.zip
          fi

      - name: Sync ramp test dependencies
        run: uv sync --frozen --extra ramp --extra predict --group test

      - name: Run ramp test
        run: RAMP_HOME="$PWD" uv run --no-sync --extra ramp --extra predict python test_ramp.py
