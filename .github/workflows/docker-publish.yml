name: Docker Publish

on:
  push:
    branches:
      - master
  release:
    types: [published]

  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.image_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: ramp
            dockerfile: docker/Dockerfile.ramp
            image_repo: fair-utilities-ramp
            flavor: cpu
          - image_name: ramp-gpu
            dockerfile: docker/Dockerfile.ramp
            image_repo: fair-utilities-ramp
            flavor: gpu
          - image_name: yolo
            dockerfile: docker/Dockerfile.yolo
            image_repo: fair-utilities-yolo
            flavor: cpu
          - image_name: yolo-gpu
            dockerfile: docker/Dockerfile.yolo
            image_repo: fair-utilities-yolo
            flavor: gpu

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_repo }}
          tags: |
            type=sha,prefix=${{ matrix.flavor }}-
            type=ref,event=branch,prefix=${{ matrix.flavor }}-
            type=ref,event=tag,prefix=${{ matrix.flavor }}-
            type=raw,value=${{ matrix.flavor }}-latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            FLAVOR=${{ matrix.flavor }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
